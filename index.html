<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог растений</title>

  <style>
    :root {
      --bg: #fafbfa;
      --panel: #ffffff;
      --ink: #1c2620;
      --muted: #9aa39c;
      --brand: #3f7d54;
      --brand-soft: #eef5f0;
      --line: #edf0ed;
      --sun: #8a6a1f;
      --sun-bg: #fbf4e3;
      --soil: #2f6b3a;
      --soil-bg: #eef6ef;
    }

    [data-theme="dark"] {
      --bg: #0e1310;
      --panel: #161d18;
      --ink: #e7efe9;
      --muted: #7a877e;
      --brand: #74b487;
      --brand-soft: #1a261e;
      --line: #222b25;
      --sun: #e3c279;
      --sun-bg: #2a2414;
      --soil: #9ed6ab;
      --soil-bg: #172418;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      font-size: 15px;
      transition: background 0.25s, color 0.25s;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }

    .head-row {
      display: flex;
      align-items: center;
      padding: 22px 0 16px;
    }

    .logo {
      font-size: 21px;
      font-weight: 600;
      margin: 0;
      flex: 1;
      letter-spacing: -0.3px;
    }

    .theme-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--brand);
    }

    .searchbar {
      position: relative;
      margin-bottom: 14px;
    }

    .searchbar .ico {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      opacity: 0.4;
    }

    #search {
      width: 100%;
      padding: 12px 16px 12px 42px;
      font-size: 15px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 12px;
      outline: none;
      transition: 0.2s;
    }

    #search:focus {
      border-color: var(--brand);
    }

    .filters {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 16px;
    }

    .frow {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .frow .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      min-width: 48px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s;
    }

    .chip:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .chip.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 4px;
      flex-wrap: wrap;
      gap: 10px;
    }

    #count {
      color: var(--muted);
      font-size: 13px;
    }

    #count b {
      color: var(--ink);
      font-weight: 600;
    }

    #reset {
      border: none;
      background: transparent;
      color: var(--brand);
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 7px;
      display: none;
    }

    #reset:hover {
      background: var(--brand-soft);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      padding: 8px 0 70px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.15s, transform 0.15s;
      animation: fade 0.3s ease both;
    }

    .card:hover {
      border-color: var(--brand);
      transform: translateY(-2px);
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .card h3 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    .norma {
      color: var(--muted);
      font-size: 12.5px;
      margin-bottom: 11px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 11.5px;
      padding: 3px 9px;
      border-radius: 14px;
      font-weight: 500;
    }

    .tag.s {
      background: var(--sun-bg);
      color: var(--sun);
    }

    .tag.p {
      background: var(--soil-bg);
      color: var(--soil);
    }

    .empty {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
      display: none;
    }

    .empty .big {
      font-size: 38px;
      margin-bottom: 8px;
    }

    @media (max-width: 520px) {
      .wrap {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body data-theme="light">
  <header>
    <div class="wrap">
      <div class="head-row">
        <h1 class="logo">Каталог растений</h1>
        <button class="theme-btn" id="theme" title="Сменить тему">🌙</button>
      </div>

      <div class="searchbar">
        <span class="ico">🔍</span>
        <input id="search" placeholder="Поиск по названию...">
      </div>

      <div class="filters">
        <div class="frow" id="svetRow">
          <span class="label">Свет</span>
        </div>

        <div class="frow" id="pochvaRow">
          <span class="label">Почва</span>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="bar">
      <div id="count"></div>
      <button id="reset">Сбросить ×</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="empty" id="empty">
      <div class="big">🤷</div>
      Ничего не найдено
    </div>
  </div>

  <script>
    var grid = document.getElementById('grid');
    var empty = document.getElementById('empty');
    var count = document.getElementById('count');
    var reset = document.getElementById('reset');
    var search = document.getElementById('search');
    var svetRow = document.getElementById('svetRow');
    var pochvaRow = document.getElementById('pochvaRow');
    var themeButton = document.getElementById('theme');
    var body = document.body;

    var cards = [];

    var activeTags = [];

    var LIGHT_WORDS = [
      'солнце',
      'полутень',
      'тень',
      'теневынослива',
      'теневыносливое',
      'теневыносливый'
    ];

    function cleanText(text) {
      return String(text || '').trim();
    }

    function normalizeText(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .trim();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function splitToTags(text) {
      if (!text) {
        return [];
      }

      return String(text)
        .replaceAll('|', ',')
        .replaceAll(';', ',')
        .replaceAll('/', ',')
        .replace(/\r?\n/g, ',')
        .split(',')
        .map(function(item) {
          return cleanText(item);
        })
        .filter(function(item) {
          return item.length > 0;
        });
    }

    function uniqueTags(tags) {
      var result = [];
      var seen = {};

      tags.forEach(function(tag) {
        var key = normalizeText(tag);

        if (!key) {
          return;
        }

        if (!seen[key]) {
          seen[key] = true;
          result.push(tag);
        }
      });

      return result;
    }

    function isLightTag(tag) {
      var t = normalizeText(tag);
      return LIGHT_WORDS.indexOf(t) >= 0;
    }

    function formatNorma(norma) {
      norma = cleanText(norma);

      if (!norma) {
        return '—';
      }

      if (
        norma.indexOf('шт') >= 0 ||
        norma.indexOf('м²') >= 0 ||
        norma.indexOf('м2') >= 0
      ) {
        return norma;
      }

      return norma + ' шт/м²';
    }

    function detectSeparator(line) {
      var commas = (line.match(/,/g) || []).length;
      var semicolons = (line.match(/;/g) || []).length;

      if (semicolons > commas) {
        return ';';
      }

      return ',';
    }

    function parseCSV(text) {
      text = String(text || '').replace(/^\uFEFF/, '');

      var firstLine = text.split(/\r?\n/)[0] || '';
      var separator = detectSeparator(firstLine);

      var rows = [];
      var row = [];
      var cell = '';
      var insideQuotes = false;

      for (var i = 0; i < text.length; i++) {
        var char = text[i];
        var next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === separator && !insideQuotes) {
          row.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (cell || row.length) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          }

          if (char === '\r' && next === '\n') {
            i++;
          }
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function findColumn(headers, names, fallback) {
      for (var i = 0; i < headers.length; i++) {
        var h = normalizeText(headers[i]);

        for (var j = 0; j < names.length; j++) {
          if (h.indexOf(names[j]) >= 0) {
            return i;
          }
        }
      }

      return fallback;
    }

    function isBadTagColumn(header) {
      header = normalizeText(header);

      if (!header) {
        return false;
      }

      var badWords = [
        'название',
        'растение',
        'name',
        'норма',
        'посад',
        'шт',
        'фото',
        'ссылка',
        'комментар',
        'примеч',
        'описание',
        'description',
        'высота',
        'ширина',
        'размер',
        'цветок',
        'цветение',
        'период'
      ];

      for (var i = 0; i < badWords.length; i++) {
        if (header.indexOf(badWords[i]) >= 0) {
          return true;
        }
      }

      return false;
    }

    function makeCard(name, norma, svetTags, pochvaTags) {
      svetTags = uniqueTags(svetTags);
      pochvaTags = uniqueTags(pochvaTags);

      var allTags = uniqueTags(svetTags.concat(pochvaTags));
      var allTagsClean = allTags.map(function(tag) {
        return normalizeText(tag);
      });

      var tagsHtml = '';

      svetTags.forEach(function(tag) {
        tagsHtml += '<span class="tag s">' + escapeHtml(tag) + '</span>';
      });

      pochvaTags.forEach(function(tag) {
        tagsHtml += '<span class="tag p">' + escapeHtml(tag) + '</span>';
      });

      var article = document.createElement('article');

      article.className = 'card';
      article.dataset.name = normalizeText(name);
      article.dataset.tags = allTagsClean.join('|');

      article.innerHTML =
        '<h3>' + escapeHtml(name) + '</h3>' +
        '<div class="norma">' + escapeHtml(formatNorma(norma)) + '</div>' +
        '<div class="tags">' + tagsHtml + '</div>';

      grid.appendChild(article);
    }

    function makeFilterButton(row, tag) {
      var button = document.createElement('button');

      button.className = 'chip';
      button.dataset.v = normalizeText(tag);
      button.textContent = tag;

      button.onclick = function() {
        toggleTag(button.dataset.v);
        button.classList.toggle('active');
        filterCards();
      };

      row.appendChild(button);
    }

    function toggleTag(tag) {
      var index = activeTags.indexOf(tag);

      if (index < 0) {
        activeTags.push(tag);
      } else {
        activeTags.splice(index, 1);
      }
    }

    function hasAnySelectedTag(cardTags) {
      if (activeTags.length === 0) {
        return true;
      }

      for (var i = 0; i < activeTags.length; i++) {
        if (cardTags.indexOf(activeTags[i]) >= 0) {
          return true;
        }
      }

      return false;
    }

   function filterCards() {
  var q = normalizeText(search.value);
  var n = 0;

  cards.forEach(function(card) {
    var nameOk = card.dataset.name.indexOf(q) >= 0;
    var cardTags = card.dataset.tags ? card.dataset.tags.split('|') : [];

    var tagsOk = true;

    if (activeTags.length > 0) {
      tagsOk = false;

      for (var i = 0; i < activeTags.length; i++) {
        if (cardTags.indexOf(activeTags[i]) >= 0) {
          tagsOk = true;
          break;
        }
      }
    }

    var show = nameOk && tagsOk;

    card.style.display = show ? '' : 'none';

    if (show) {
      n++;
    }
  });

  count.innerHTML = 'Найдено: <b>' + n + '</b> из ' + cards.length;
  empty.style.display = n ? 'none' : 'block';
  reset.style.display = q || activeTags.length ? 'inline-block' : 'none';
}

    function buildFilters(svetTags, pochvaTags) {
      svetTags = uniqueTags(svetTags).sort(function(a, b) {
        return a.localeCompare(b, 'ru');
      });

      pochvaTags = uniqueTags(pochvaTags).sort(function(a, b) {
        return a.localeCompare(b, 'ru');
      });

      svetTags.forEach(function(tag) {
        makeFilterButton(svetRow, tag);
      });

      pochvaTags.forEach(function(tag) {
        makeFilterButton(pochvaRow, tag);
      });
    }

    function loadNewCSV() {
      fetch('new.csv?v=' + Date.now())
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Файл new.csv не найден');
          }

          return response.text();
        })
        .then(function(text) {
          var rows = parseCSV(text);

          if (!rows.length) {
            count.innerHTML = 'Файл new.csv пустой';
            empty.style.display = 'block';
            return;
          }

          var headers = rows[0];

          var nameCol = findColumn(headers, ['название', 'растение', 'name'], 0);
          var normaCol = findColumn(headers, ['норма', 'посад', 'шт'], 1);

          var allSvetTags = [];
          var allPochvaTags = [];

          rows.slice(1).forEach(function(row) {
            var name = cleanText(row[nameCol]);
            var norma = cleanText(row[normaCol]);

            if (!name) {
              return;
            }

            var svetTags = [];
            var pochvaTags = [];

            row.forEach(function(cell, index) {
              if (index === nameCol) {
                return;
              }

              if (index === normaCol) {
                return;
              }

              var header = headers[index] || '';

              if (isBadTagColumn(header)) {
                return;
              }

              var pieces = splitToTags(cell);

              pieces.forEach(function(tag) {
                if (isLightTag(tag)) {
                  svetTags.push(tag);
                  allSvetTags.push(tag);
                } else {
                  pochvaTags.push(tag);
                  allPochvaTags.push(tag);
                }
              });
            });

            makeCard(name, norma, svetTags, pochvaTags);
          });

          cards = [].slice.call(document.querySelectorAll('.card'));

          buildFilters(allSvetTags, allPochvaTags);

          filterCards();
        })
        .catch(function(error) {
          count.innerHTML = 'Не найден файл new.csv';
          empty.style.display = 'block';
          console.log(error);
        });
    }

    search.oninput = filterCards;

    reset.onclick = function() {
      search.value = '';
      activeTags = [];

      [].slice.call(document.querySelectorAll('.chip.active')).forEach(function(chip) {
        chip.classList.remove('active');
      });

      filterCards();
    };

    function setTheme(theme) {
      body.dataset.theme = theme;
      themeButton.textContent = theme === 'dark' ? '☀️' : '🌙';

      try {
        localStorage.setItem('theme', theme);
      } catch (e) {}
    }

    themeButton.onclick = function() {
      if (body.dataset.theme === 'dark') {
        setTheme('light');
      } else {
        setTheme('dark');
      }
    };

    try {
      var savedTheme = localStorage.getItem('theme');

      if (savedTheme) {
        setTheme(savedTheme);
      } else if (matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark');
      }
    } catch (e) {}

    loadNewCSV();
  </script>
</body>
</html>
