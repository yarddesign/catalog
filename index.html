<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог растений</title>

  <style>
    :root{
      --bg:#f5f6f2;
      --panel:#ffffff;
      --ink:#17211b;
      --muted:#8a948d;
      --brand:#3f7d54;
      --brand-soft:#edf6ef;
      --line:#e3e9e3;
      --sun:#8a6518;
      --sun-bg:#fff3d3;
      --soil:#2f6b3a;
      --soil-bg:#eaf7ee;
    }

    body[data-theme="dark"]{
      --bg:#0f1511;
      --panel:#151c17;
      --ink:#e9f0eb;
      --muted:#859188;
      --brand:#7bc18e;
      --brand-soft:#1d2b21;
      --line:#28322b;
      --sun:#e8c878;
      --sun-bg:#302714;
      --soil:#9ed9ad;
      --soil-bg:#172519;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-size:15px;
    }

    .wrap{
      max-width:1380px;
      margin:0 auto;
      padding:0 28px;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(245,246,242,.9);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    body[data-theme="dark"] header{
      background:rgba(15,21,17,.9);
    }

    header .wrap{
      padding-top:16px;
      padding-bottom:16px;
    }

    .head-row{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:12px;
    }

    .brand{
      flex:1;
      min-width:0;
    }

    .eyebrow,
    .subtitle{
      display:none;
    }

    .logo{
      margin:0;
      font-size:28px;
      line-height:1.1;
      font-weight:800;
      letter-spacing:-.7px;
    }

    .theme-btn{
      width:42px;
      height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--ink);
      font-size:17px;
      cursor:pointer;
    }

    .searchbar{
      position:relative;
    }

    .searchbar .ico{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      opacity:.45;
      pointer-events:none;
    }

    #search{
      width:100%;
      height:48px;
      padding:0 16px 0 46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      color:var(--ink);
      font-size:15px;
      outline:none;
    }

    #search:focus{
      border-color:var(--brand);
    }

    .main-layout{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:24px;
      align-items:start;
      padding-top:24px;
    }

    .sidebar{
      position:sticky;
      top:146px;
    }

    .sidebar-inner{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;

      max-height:calc(100vh - 170px);
      overflow-y:auto;
    }

    .sidebar-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:18px;
    }

    .filters{
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    .frow{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .frow .label{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.8px;
      margin-bottom:2px;
    }

    .chip{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:transparent;
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      cursor:pointer;
      transition:.15s;
    }

    .chip:hover{
      background:var(--brand-soft);
      color:var(--brand);
    }

    .chip.active{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
    }

    .content{
      min-width:0;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    #count{
      color:var(--muted);
      font-size:15px;
    }

    #count b{
      color:var(--ink);
    }

    .bar-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    #mode,
    #reset{
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--ink);
      border-radius:12px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
    }

    #mode.active{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
    }

    #reset{
      display:none;
      color:var(--brand);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:16px;
      padding-bottom:80px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      min-height:178px;
      transition:.15s;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--brand);
    }

    .card h3{
      margin:0 0 10px;
      font-size:17px;
      line-height:1.28;
      font-weight:800;
      letter-spacing:-.3px;
    }

    .norma{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
      margin-bottom:16px;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
    }

    .tag{
      display:inline-flex;
      border-radius:999px;
      padding:6px 9px;
      font-size:12px;
      font-weight:700;
      line-height:1;
    }

    .tag.s{
      background:var(--sun-bg);
      color:var(--sun);
    }

    .tag.p{
      background:var(--soil-bg);
      color:var(--soil);
    }

    .empty{
      display:none;
      text-align:center;
      padding:70px 20px;
      color:var(--muted);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
    }

    .empty .big{
      font-size:42px;
      margin-bottom:10px;
    }

    @media(max-width:900px){
      .wrap{
        padding:0 16px;
      }

      .main-layout{
        display:block;
        padding-top:16px;
      }

      .sidebar{
        position:static;
        margin-bottom:18px;
      }

      .sidebar-inner{
        max-height:none;
        overflow:visible;
      }

      .filters{
        gap:18px;
      }

      .frow{
        flex-direction:row;
        flex-wrap:wrap;
      }

      .frow .label{
        width:100%;
      }

      .chip{
        width:auto;
      }

      .bar{
        align-items:flex-start;
        flex-direction:column;
      }

      .bar-actions{
        width:100%;
        justify-content:space-between;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .logo{
        font-size:23px;
      }
    }
  </style>
</head>

<body data-theme="light">

<header>
  <div class="wrap">
    <div class="head-row">
      <div class="brand">
        <div class="eyebrow">Подбор растений</div>
        <h1 class="logo">Каталог декоративных злаков</h1>
        <p class="subtitle">Фильтруй растения по свету, почве и режиму отбора</p>
      </div>

      <button class="theme-btn" id="theme" title="Сменить тему">🌙</button>
    </div>

    <div class="searchbar">
      <span class="ico">🔍</span>
      <input id="search" placeholder="Поиск по названию...">
    </div>
  </div>
</header>

<div class="wrap main-layout">

  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-title">Фильтры</div>

      <div class="filters">
        <div class="frow" id="svetFilters">
          <span class="label">Свет</span>
        </div>

        <div class="frow" id="pochvaFilters">
          <span class="label">Почва</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="bar">
      <div id="count">Загрузка...</div>

      <div class="bar-actions">
        <button id="mode">Режим: ИЛИ</button>
        <button id="reset">Сбросить &times;</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="empty" id="empty">
      <div class="big">🤷</div>
      Ничего не найдено
    </div>
  </main>

</div>

<script>
  var grid = document.getElementById('grid');
  var body = document.body;
  var empty = document.getElementById('empty');
  var count = document.getElementById('count');
  var reset = document.getElementById('reset');
  var search = document.getElementById('search');
  var mode = document.getElementById('mode');
  var themeButton = document.getElementById('theme');

  var strictMode = false;

  var activeFilters = {
    svet: [],
    pochva: []
  };

  var cards = [];

  function cleanText(text) {
    return String(text || '')
      .replace(/\u00A0/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function normalizeName(text) {
    return cleanText(text)
      .toLowerCase()
      .replace(/ё/g, 'е');
  }

  function normalizeTag(text) {
    var tag = normalizeName(text);

    var map = {
      'солнце': 'солнце',
      'полное солнце': 'солнце',
      'солнечное место': 'солнце',

      'полутень': 'полутень',
      'полу тень': 'полутень',

      'тень': 'тень',

      'теневынослива': 'теневынослива',
      'теневыносливая': 'теневынослива',
      'теневынослив': 'теневынослива',

      'бедные': 'бедные почвы',
      'бедная': 'бедные почвы',
      'бедная почва': 'бедные почвы',
      'бедные почвы': 'бедные почвы',

      'влажная': 'влажные почвы',
      'влажные': 'влажные почвы',
      'влажная почва': 'влажные почвы',
      'влажные почвы': 'влажные почвы',
      'сырая': 'влажные почвы',
      'сырые': 'влажные почвы',
      'очень влажная': 'влажные почвы',
      'очень влажные': 'влажные почвы',

      'умеренно влажная': 'умеренно влажные',
      'умеренно влажные': 'умеренно влажные',
      'умеренно влажные почвы': 'умеренно влажные',
      'слегка влажная': 'умеренно влажные',
      'слегка влажные': 'умеренно влажные',

      'дренированная': 'дренированные почвы',
      'дренированные': 'дренированные почвы',
      'дренированная почва': 'дренированные почвы',
      'дренированные почвы': 'дренированные почвы',
      'хорошо дренированные': 'дренированные почвы',
      'хорошо дренированные почвы': 'дренированные почвы',

      'засухоустойчива': 'засухоустойчива',
      'засухоустойчивая': 'засухоустойчива',
      'засухоустойчивые': 'засухоустойчива',
      'выдерживает засуху': 'засухоустойчива',
      'полусухая': 'засухоустойчива',

      'глинистые': 'глинистые почвы',
      'глинистая': 'глинистые почвы',
      'глинистая почва': 'глинистые почвы',
      'глинистые почвы': 'глинистые почвы',

      'каменистые': 'каменистые почвы',
      'каменистая': 'каменистые почвы',
      'каменистая почва': 'каменистые почвы',
      'каменистые почвы': 'каменистые почвы',

      'кислые': 'кислые почвы',
      'кислая': 'кислые почвы',
      'кислая почва': 'кислые почвы',
      'кислые почвы': 'кислые почвы',

      'легкие': 'легкие почвы',
      'легкая': 'легкие почвы',
      'легкая почва': 'легкие почвы',
      'легкие почвы': 'легкие почвы',

      'нетребователен': 'к почвам нетребовательна',
      'нетребовательна': 'к почвам нетребовательна',
      'нетребовательные': 'к почвам нетребовательна',
      'к почвам нетребователен': 'к почвам нетребовательна',
      'к почвам нетребовательна': 'к почвам нетребовательна',

      'песчаные': 'песчаные почвы',
      'песчаная': 'песчаные почвы',
      'песчаная почва': 'песчаные почвы',
      'песчаные почвы': 'песчаные почвы',

      'плодородная': 'плодородные почвы',
      'плодородные': 'плодородные почвы',
      'плодородная почва': 'плодородные почвы',
      'плодородные почвы': 'плодородные почвы',

      'рыхлые': 'рыхлые почвы',
      'рыхлая': 'рыхлые почвы',
      'рыхлая почва': 'рыхлые почвы',
      'рыхлые почвы': 'рыхлые почвы',

      'суглинистые': 'суглинистые почвы',
      'суглинистая': 'суглинистые почвы',
      'суглинистая почва': 'суглинистые почвы',
      'суглинистые почвы': 'суглинистые почвы',

      'сухая': 'сухие почвы',
      'сухие': 'сухие почвы',
      'сухая почва': 'сухие почвы',
      'сухие почвы': 'сухие почвы'
    };

    if (map[tag]) {
      return map[tag];
    }

    return tag;
  }

  function splitTags(text) {
    if (!text) {
      return [];
    }

    var parts = String(text)
      .replace(/\|/g, ',')
      .replace(/;/g, ',')
      .replace(/\//g, ',')
      .split(',');

    var result = {};
    var list = [];

    parts.forEach(function(part) {
      var tag = normalizeTag(part);

      if (tag && !result[tag]) {
        result[tag] = true;
        list.push(tag);
      }
    });

    return list;
  }

  function makeCard(name, norma, pochvaText, svetText) {
    var svet = splitTags(svetText);
    var pochva = splitTags(pochvaText);

    var tags = '';

    svet.forEach(function(tag) {
      tags += '<span class="tag s">' + escapeHtml(tag) + '</span>';
    });

    pochva.forEach(function(tag) {
      tags += '<span class="tag p">' + escapeHtml(tag) + '</span>';
    });

    var article = document.createElement('article');
    article.className = 'card';
    article.dataset.name = normalizeName(name);
    article.dataset.svet = svet.join('|');
    article.dataset.pochva = pochva.join('|');

    var normaText = cleanText(norma || '—');

    if (normaText !== '—' && normaText.indexOf('шт') < 0) {
      normaText += ' шт/м²';
    }

    article.innerHTML =
      '<h3>' + escapeHtml(name) + '</h3>' +
      '<div class="norma">' + escapeHtml(normaText) + '</div>' +
      '<div class="tags">' + tags + '</div>';

    return article;
  }

  function detectSeparator(line) {
    var commaCount = (line.match(/,/g) || []).length;
    var semicolonCount = (line.match(/;/g) || []).length;

    if (semicolonCount > commaCount) {
      return ';';
    }

    return ',';
  }

  function parseCSV(text) {
    text = String(text || '').replace(/^\uFEFF/, '');

    var firstLine = text.split(/\r?\n/)[0] || '';
    var separator = detectSeparator(firstLine);

    var rows = [];
    var row = [];
    var cell = '';
    var insideQuotes = false;

    for (var i = 0; i < text.length; i++) {
      var char = text[i];
      var next = text[i + 1];

      if (char === '"' && insideQuotes && next === '"') {
        cell += '"';
        i++;
      } else if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === separator && !insideQuotes) {
        row.push(cell);
        cell = '';
      } else if ((char === '\n' || char === '\r') && !insideQuotes) {
        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
        }

        if (char === '\r' && next === '\n') {
          i++;
        }
      } else {
        cell += char;
      }
    }

    if (cell || row.length) {
      row.push(cell);
      rows.push(row);
    }

    return rows;
  }

  function findColumn(headers, possibleNames, defaultIndex) {
    for (var i = 0; i < headers.length; i++) {
      var header = normalizeName(headers[i]);

      for (var j = 0; j < possibleNames.length; j++) {
        if (header.indexOf(possibleNames[j]) >= 0) {
          return i;
        }
      }
    }

    return defaultIndex;
  }

  function collectTags(type) {
    var found = {};

    cards.forEach(function(card) {
      var value = card.dataset[type] || '';
      var arr = value ? value.split('|') : [];

      arr.forEach(function(tag) {
        tag = normalizeTag(tag);

        if (tag) {
          found[tag] = true;
        }
      });
    });

    return Object.keys(found).sort(function(a, b) {
      return a.localeCompare(b, 'ru');
    });
  }

  function rebuildFilters() {
    var svetRow = document.getElementById('svetFilters');
    var pochvaRow = document.getElementById('pochvaFilters');

    svetRow.innerHTML = '<span class="label">Свет</span>';
    pochvaRow.innerHTML = '<span class="label">Почва</span>';

    collectTags('svet').forEach(function(tag) {
      var button = document.createElement('button');
      button.className = 'chip';
      button.dataset.g = 'svet';
      button.dataset.v = tag;
      button.textContent = tag;
      svetRow.appendChild(button);
    });

    collectTags('pochva').forEach(function(tag) {
      var button = document.createElement('button');
      button.className = 'chip';
      button.dataset.g = 'pochva';
      button.dataset.v = tag;
      button.textContent = tag;
      pochvaRow.appendChild(button);
    });
  }

  function toggleValue(arr, value) {
    var index = arr.indexOf(value);

    if (index < 0) {
      arr.push(value);
    } else {
      arr.splice(index, 1);
    }
  }

  function hasAny(cardTags, selectedTags) {
    for (var i = 0; i < selectedTags.length; i++) {
      if (cardTags.indexOf(selectedTags[i]) >= 0) {
        return true;
      }
    }

    return false;
  }

  function filtr() {
    var query = normalizeName(search.value);
    var visibleCount = 0;

    cards.forEach(function(card) {
      var name = normalizeName(card.dataset.name || '');
      var svet = card.dataset.svet ? card.dataset.svet.split('|') : [];
      var pochva = card.dataset.pochva ? card.dataset.pochva.split('|') : [];

      var nameOk = name.indexOf(query) >= 0;

      var svetSelected = activeFilters.svet.length > 0;
      var pochvaSelected = activeFilters.pochva.length > 0;

      var svetOk = !svetSelected || hasAny(svet, activeFilters.svet);
      var pochvaOk = !pochvaSelected || hasAny(pochva, activeFilters.pochva);

      var filterOk = true;

      if (!strictMode) {
        if (svetSelected || pochvaSelected) {
          filterOk = false;

          if (svetSelected && svetOk) {
            filterOk = true;
          }

          if (pochvaSelected && pochvaOk) {
            filterOk = true;
          }
        }
      } else {
        filterOk = svetOk && pochvaOk;
      }

      var show = nameOk && filterOk;

      card.style.display = show ? '' : 'none';

      if (show) {
        visibleCount++;
      }
    });

    count.innerHTML = 'Найдено: <b>' + visibleCount + '</b> из ' + cards.length;
    empty.style.display = visibleCount ? 'none' : 'block';

    reset.style.display = (
      query ||
      activeFilters.svet.length ||
      activeFilters.pochva.length
    ) ? 'inline-block' : 'none';
  }

  function startSite() {
    cards = Array.prototype.slice.call(document.querySelectorAll('.card'));

    rebuildFilters();

    filtr();
  }

  function loadNewCSV() {
    grid.innerHTML = '';
    count.textContent = 'Загрузка...';

    fetch('new.csv?v=' + Date.now())
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Файл new.csv не найден');
        }

        return response.text();
      })
      .then(function(text) {
        var rows = parseCSV(text);

        if (!rows.length) {
          throw new Error('Файл new.csv пустой');
        }

        var headers = rows[0];

        var nameCol = findColumn(headers, ['название', 'растение', 'name'], 0);
        var normaCol = findColumn(headers, ['норма', 'посадки', 'шт'], 1);
        var pochvaCol = findColumn(headers, ['почва', 'почвы'], 2);
        var svetCol = findColumn(headers, ['свет', 'освещение'], 3);

        rows.slice(1).forEach(function(row) {
          var name = cleanText(row[nameCol]);
          var norma = cleanText(row[normaCol]);
          var pochva = cleanText(row[pochvaCol]);
          var svet = cleanText(row[svetCol]);

          if (!name) {
            return;
          }

          grid.appendChild(makeCard(name, norma, pochva, svet));
        });

        startSite();
      })
      .catch(function(error) {
        grid.innerHTML = '';
        cards = [];
        count.innerHTML = 'Ошибка: <b>' + escapeHtml(error.message) + '</b>';
        empty.style.display = 'block';
      });
  }

  document.addEventListener('click', function(event) {
    var button = event.target.closest('.chip');

    if (!button) {
      return;
    }

    var group = button.dataset.g;
    var value = button.dataset.v;

    toggleValue(activeFilters[group], value);
    button.classList.toggle('active');

    filtr();
  });

  search.oninput = filtr;

  mode.onclick = function() {
    strictMode = !strictMode;

    if (strictMode) {
      mode.textContent = 'Режим: И';
      mode.classList.add('active');
    } else {
      mode.textContent = 'Режим: ИЛИ';
      mode.classList.remove('active');
    }

    filtr();
  };

  reset.onclick = function() {
    search.value = '';

    activeFilters = {
      svet: [],
      pochva: []
    };

    Array.prototype.slice.call(document.querySelectorAll('.chip.active')).forEach(function(button) {
      button.classList.remove('active');
    });

    filtr();
  };

  function setTheme(theme) {
    body.dataset.theme = theme;
    themeButton.textContent = theme === 'dark' ? '☀️' : '🌙';

    try {
      localStorage.setItem('theme', theme);
    } catch (e) {}
  }

  themeButton.onclick = function() {
    setTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
  };

  try {
    var savedTheme = localStorage.getItem('theme');

    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia && matchMedia('(prefers-color-scheme:dark)').matches) {
      setTheme('dark');
    }
  } catch (e) {}

  loadNewCSV();
</script>

</body>
</html>
